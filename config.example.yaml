# Minimal config example.
# For the fully commented operator template with mandatory/optional notes and default behavior,
# see: examples/config.full.example.yaml

vcenter:
  host: 10.0.35.3
  user: administrator@vsphere.local
  # Prefer passing password as env var VC_PASSWORD at runtime.
  password: ""

cloudstack:
  endpoint: "http://cloudstack.example.com:8080/client/api"
  api_key: "change-me"
  secret_key: "change-me"

cloudstack_defaults:
  zoneid: ""
  clusterid: ""
  storageid: ""
  networkid: ""
  serviceofferingid: ""
  diskofferingid: ""

vddk:
  libdir: /opt/vmware-vddk/vmware-vix-disklib-distrib
  server: 10.0.35.3
  user: administrator@vsphere.local
  # Prefer passing password as env var VC_PASSWORD at runtime.
  password: ""
  thumbprint: "AA:BB:CC:DD:EE:FF:11:22:33:44:55:66:77:88:99:AA:BB:CC:DD:EE"

engine:
  readers: 4
  queue_depth: 64
  min_chunk_mb: 1
  max_chunk_mb: 4
  fast_latency_ms: 40
  slow_latency_ms: 250
  fast_mbps: 180
  slow_mbps: 40
  chunk_mb_delta: 4

migration:
  # Optional orchestrator defaults for run mode.
  control_dir: /var/lib/vm-migrator
  specs_dir: /var/lib/vm-migrator/specs
  workdir: /opt/vmware-to-cloudstack
  shutdown_mode: auto # auto | force | manual
  parallel_disks: 4
  parallel_vms: 3

virt:
  run_virt_v2v: true
  virtio_iso: /usr/share/virtio-win/virtio-win.iso
