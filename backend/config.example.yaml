vcenter:
  host: "10.0.35.3"
  user: "administrator@vsphere.local"
  password: "change-me"
  port: 443
  insecure: true

cloudstack:
  endpoint: "http://cloudstack.example.com/client/api"
  api_key: "change-me"
  secret_key: "change-me"
  timeout_seconds: 30

migration:
  control_dir: "/var/lib/vm-migrator"
  specs_dir: "/var/lib/vm-migrator/specs"
  workdir: "/opt/vmware-to-cloudstack"
  migrate_script: "migrate.py"
  python_bin: "python3"
  # Optional extra args appended before spec flag.
  # migrate_args: []
  #
  # Optional runtime config forwarding (useful for Go engine):
  # runtime_config_flag: "--config"
  # runtime_config: "/opt/vmware-to-cloudstack/config.yaml"
  # spec_flag: "--spec"
  #
  # Example Go launcher:
  # python_bin: "/opt/vmware-to-cloudstack/go_rewrite/v2c-engine"
  # migrate_script: "run"
  # runtime_config_flag: "--config"
  # runtime_config: "/opt/vmware-to-cloudstack/go_rewrite/config.yaml"
  parallel_vms: 4
